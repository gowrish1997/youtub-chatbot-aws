name: Deploy to AWS ECR & EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout code
    - name: Checkout
      uses: actions/checkout@v3

    # 2. Configure AWS credentials
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 3. Login to ECR
    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
        | docker login --username AWS --password-stdin ${{ secrets.ECR_REPO_URI }}

    # 4. Build Docker image
    - name: Build Image
      run: |
        docker build -t fastapi-rag .

    # 5. Tag image
    - name: Tag Image
      run: |
        docker tag fastapi-rag:latest ${{ secrets.ECR_REPO_URI }}:latest

    # 6. Push to ECR
    - name: Push Image
      run: |
        docker push ${{ secrets.ECR_REPO_URI }}:latest

    # 7. Deploy to EC2 via SSH
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/your-repo
          ./deploy.sh