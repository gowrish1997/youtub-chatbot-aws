name: Deploy to AWS ECR & EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # All secrets are sourced from GitHub Secrets, not from Docker .env files

    steps:

    # 1. Checkout code
    - name: Checkout
      uses: actions/checkout@v3

    # 2. Configure AWS credentials
    # AWS credentials are retrieved from GitHub Secrets
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 3. Login to ECR
    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
        | docker login --username AWS --password-stdin ${{ secrets.ECR_REPO_URI }}

    # 4. Build Docker image
    # Note: Secrets are passed from GitHub Secrets, not from .env file
    - name: Build Image
      run: |
        docker build -t fastapi-rag . --no-cache

    # 5. Tag image
    - name: Tag Image
      run: |
        docker tag fastapi-rag:latest ${{ secrets.ECR_REPO_URI }}:latest

    # 6. Push to ECR
    - name: Push Image
      run: |
        docker push ${{ secrets.ECR_REPO_URI }}:latest

    # 7. Deploy to EC2 via SSH
    # EC2 instance credentials come from GitHub Secrets
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Create the .env file from GitHub Secrets
          # Add every secret your app needs here:
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> .env
          echo "EC2_HOST=${{ secrets.EC2_HOST }}" >> .env
          echo "EC2_USER=${{ secrets.EC2_USER }}" >> .env
          echo "EC2_SSH_KEY=${{ secrets.EC2_SSH_KEY }}" >> .env
          echo "ECR_REPO_URI=${{ secrets.ECR_REPO_URI }}" >> .env
          echo "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" >> .env
          echo "PINECONE_INDEX=${{ secrets.PINECONE_INDEX }}" >> .env
          
          # 2. Authenticate Docker on the EC2 instance (so it can pull from ECR)
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REPO_URI }}

          # 3. Run the deployment script
          chmod +x deploy.sh
          ./deploy.sh